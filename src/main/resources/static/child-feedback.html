<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Camp Feedback - CampSphere</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="/css/modern-style.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      min-height: 100vh;
    }
    
    .page-header {
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      color: white;
      padding: 3rem 0;
      margin-bottom: 3rem;
      border-radius: 0 0 2rem 2rem;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
    }
    
    .feedback-card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border: 2px solid #d1fae5;
    }
    
    .fun-emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="modern-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">⛺ CampSphere</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar"
            aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbar">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/login-child.html">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header text-center">
  <div class="container">
    <div class="fun-emoji">📸</div>
    <h1 class="display-5 fw-bold mb-2">Share Your Camp Adventures!</h1>
    <p class="lead mb-0">Tell us about your awesome camp experience</p>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container pb-5 d-flex justify-content-center">
  <div class="feedback-card" style="width: 100%; max-width: 700px;">
    <form id="feedbackForm" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="childName" class="modern-form-label">👤 Your Name</label>
        <input type="text" id="childName" class="modern-form-control" disabled style="width: 100%;">
      </div>

      <div class="mb-3">
        <label for="campSelect" class="modern-form-label">🏕️ Which Camp?</label>
        <select id="campSelect" class="modern-form-control" required style="width: 100%;">
          <option value="">Choose your camp...</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="comment" class="modern-form-label">💭 Tell Us Your Story!</label>
        <textarea id="comment" class="modern-form-control" rows="5" placeholder="What was your favorite part? What did you learn? What made you smile? 😊" required style="width: 100%; resize: vertical;"></textarea>
      </div>

      <div class="mb-4">
        <label for="photo" class="modern-form-label">📷 Share a Photo (optional)</label>
        <input type="file" id="photo" class="modern-form-control" accept="image/*" style="width: 100%;">
        <small class="text-muted d-block mt-2">Upload a cool photo from camp!</small>
      </div>

      <button type="submit" class="btn btn-modern-primary py-3" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%); font-size: 1.1rem; width: 100%; border-radius: 50px; border: none; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);">
        🎉 Submit My Feedback!
      </button>
    </form>
  </div>
</div>

<!-- FOOTER -->
<footer class="modern-footer mt-auto">
  <div class="container text-center">
    <p class="mb-0">© 2025 CampSphere. Making camp memories! ⛺</p>
  </div>
</footer>

<script>
  let currentChild;

  async function loadData() {
    const meRes = await fetch("/api/auth/child/me", { credentials: "include" });
    if (!meRes.ok) return window.location.href = "/login-child.html";
    currentChild = await meRes.json();
    document.getElementById("childName").value = `${currentChild.name} (${currentChild.email})`;

    const camps = await fetch("/api/camps", { credentials: "include" }).then(r => r.json());
    const campSelect = document.getElementById("campSelect");
    camps.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.text = `${c.name} (${c.startDate})`;
      campSelect.appendChild(opt);
    });
  }

  document.getElementById("feedbackForm").addEventListener("submit", async e => {
    e.preventDefault();
    const campId = +document.getElementById("campSelect").value;
    const comment = document.getElementById("comment").value;
    const file = document.getElementById("photo").files[0];

    const fbRes = await fetch("/api/feedback", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        comment,
        child: { id: currentChild.id },
        camp:  { id: campId }
      })
    });

    if (!fbRes.ok) return alert("❌ Error submitting feedback");

    const feedback = await fbRes.json();

    if (file) {
      const fd = new FormData();
      fd.append("feedbackId", feedback.id);
      fd.append("file", file);
      const uploadRes = await fetch("/api/photos", {
        method: "POST",
        credentials: "include",
        body: fd
      });
      if (!uploadRes.ok) alert("⚠️ Photo upload failed");
    }

    alert("✅ Feedback submitted!");
    e.target.reset();
  });

  loadData();
</script>
</body>
</html>
