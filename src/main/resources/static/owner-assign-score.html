<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Assign Score - CampSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/modern-style.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
            min-height: 100vh;
        }
        
        .page-header {
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 3rem;
            border-radius: 0 0 2rem 2rem;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
        }
        
        .form-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 2px solid #e9d5ff;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="modern-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⛺ CampSphere</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/owner-dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/owner-login.html">Log out</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header text-center">
    <div class="container">
        <h1 class="display-5 fw-bold mb-2">🎯 Assign Score</h1>
        <p class="lead mb-0">Award points to groups for activities</p>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="container pb-5">
    <div class="form-card">
        <form id="scoreForm">
            <div class="mb-3">
                <label class="modern-form-label">Select Camp</label>
                <select id="campSelect" class="modern-form-control" style="width: 100%;"></select>
            </div>

            <div class="mb-3">
                <label class="modern-form-label">Select Group</label>
                <select id="groupSelect" class="modern-form-control" required style="width: 100%;"></select>
            </div>

            <div class="mb-3">
                <label class="modern-form-label">Select Activity</label>
                <select id="activitySelect" class="modern-form-control" required style="width: 100%;"></select>
            </div>

            <div class="mb-4">
                <label class="modern-form-label">Points</label>
                <input type="number" id="points" class="modern-form-control" required style="width: 100%;">
            </div>

            <button type="submit" class="btn btn-modern-primary w-100">⭐ Assign Score</button>
        </form>
    </div>

    <div class="text-center mt-4">
        <a href="/owner-dashboard.html" class="btn btn-outline-primary rounded-pill px-4">← Back to Dashboard</a>
    </div>
</div>

<!-- FOOTER -->
<footer class="modern-footer mt-auto">
    <div class="container text-center">
        <p class="mb-0">© 2025 CampSphere. Making camp memories! ⛺</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadCamps() {
      const res = await fetch("/api/camps", { credentials: "include" });
      if (res.status >= 400) return window.location.href = "/owner-login.html";
      const camps = await res.json();
      const select = document.getElementById("campSelect");
      camps.forEach(c => select.add(new Option(`${c.name}`, c.id)));
      select.addEventListener("change", () => loadGroupsAndActivities(select.value));
      if (camps.length) loadGroupsAndActivities(camps[0].id);
    }

    async function loadGroupsAndActivities(campId) {
      const [gRes, aRes] = await Promise.all([
        fetch(`/api/groups/byCamp/${campId}`, { credentials: "include" }),
        fetch(`/api/activities/byCamp/${campId}`, { credentials: "include" })
      ]);
      if (gRes.status >= 400 || aRes.status >= 400) return window.location.href = "/owner-login.html";
      const groups = await gRes.json();
      const acts = await aRes.json();

      const gs = document.getElementById("groupSelect");
      const as = document.getElementById("activitySelect");
      gs.innerHTML = "";
      as.innerHTML = "";
      groups.forEach(g => gs.add(new Option(g.groupName, g.id)));
      acts.forEach(a => as.add(new Option(a.name, a.id)));
    }

    document.getElementById("scoreForm").addEventListener("submit", async e => {
      e.preventDefault();
      const payload = {
        groupId: +document.getElementById("groupSelect").value,
        activityId: +document.getElementById("activitySelect").value,
        points: +document.getElementById("points").value
      };
      const res = await fetch("/api/scores", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (res.status >= 400) {
        if (res.status === 401 || res.status === 403) return window.location.href = "/owner-login.html";
        const err = await res.text();
        return alert("Error: " + err);
      }
      alert("✅ Score assigned!");
      e.target.reset();
    });

    loadCamps();
</script>
</body>
</html>
