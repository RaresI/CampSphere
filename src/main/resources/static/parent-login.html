<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Parent Login - CampSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/modern-style.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('/assets/camp-hero.jpg') center/cover no-repeat;
            opacity: 0.1;
            z-index: 0;
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 1rem;
        }
        
        .login-card {
            background: white;
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

<!-- Back to Home Button -->
<div style="position: absolute; top: 1.5rem; left: 1.5rem; z-index: 10;">
    <a href="/" class="btn btn-light rounded-pill px-4">
        ← Back to Home
    </a>
</div>

<!-- Login Container -->
<div class="login-container">
    <div class="login-card">
        <div class="login-icon">👨‍👩‍👧‍👦</div>
        <h2 class="text-center fw-bold mb-2">Parent Login</h2>
        <p class="text-center text-muted mb-4">Welcome back to CampSphere!</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="modern-form-label">Email Address</label>
                <input type="email" id="email" class="modern-form-control" name="email" placeholder="your.email@example.com" required>
            </div>
            <div class="mb-4">
                <label for="phone" class="modern-form-label">Phone Number</label>
                <input type="text" id="phone" class="modern-form-control" name="phone" placeholder="+40 123 456 789" required>
            </div>
            <button type="submit" class="btn btn-modern-primary w-100 py-3 mb-3">
                Login to Dashboard
            </button>
        </form>
        
        <div class="text-center">
            <p class="text-muted mb-0">
                Don't have an account? 
                <a href="/parent-register.html" class="fw-semibold text-decoration-none" style="color: var(--primary-blue);">
                    Register here
                </a>
            </p>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <p class="text-white mb-2">
            <small>Need help? <a href="#" class="text-white fw-semibold">Contact Support</a></small>
        </p>
    </div>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async e => {
      e.preventDefault();
      const f = e.target;
      const params = new URLSearchParams({
        email: f.email.value.trim(),
        phone: f.phone.value.trim()
      });
      const res = await fetch("/api/parents/login?" + params.toString(), {
        method: "POST"
      });
      if (!res.ok) {
        return alert("❌ " + await res.text());
      }
      const parent = await res.json();
      localStorage.setItem("parentId", parent.id);
      localStorage.setItem("parentEmail", parent.email);
      localStorage.setItem("parentName", parent.name);
      location.href = "/parent-dashboard.html";
    });
</script>
</body>
</html>
