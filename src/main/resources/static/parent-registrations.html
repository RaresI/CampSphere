<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Camp Registration - CampSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/modern-style.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            min-height: 100vh;
        }
        
        .page-header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 3rem;
            border-radius: 0 0 2rem 2rem;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
        }
        
        .registration-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 2px solid #dbeafe;
        }
        
        .form-check-label {
            cursor: pointer;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .form-check-label:hover {
            background: #e0f2fe;
        }
        
        .form-check-input:checked + label {
            background: #dbeafe;
            font-weight: 500;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="modern-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⛺ CampSphere</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/parent-dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/parent-children.html">My Children</a></li>
                <li class="nav-item"><a class="nav-link" href="/parent-login.html">Log out</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header text-center">
    <div class="container">
        <h1 class="display-5 fw-bold mb-2">📅 Camp Registration</h1>
        <p class="lead mb-0">Register your children for camps and optional trips</p>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="container pb-5 d-flex justify-content-center">
    <div class="registration-card" style="width: 100%; max-width: 700px;">
        <form>
            <div class="mb-3">
                <label for="childSelect" class="modern-form-label">👶 Select Your Child</label>
                <select id="childSelect" class="modern-form-control" required style="width: 100%;"></select>
            </div>

            <div class="mb-3">
                <label for="campSelect" class="modern-form-label">🏕️ Select Camp</label>
                <select id="campSelect" class="modern-form-control" required style="width: 100%;"></select>
            </div>

            <div class="mb-4">
                <label class="modern-form-label">🎒 Optional Trips</label>
                <div id="tripContainer" style="padding: 1rem; background: #f8fafc; border-radius: 0.75rem;">
                    <em class="text-muted">Select a camp to see optional trips.</em>
                </div>
            </div>

            <button type="button" id="registerBtn" class="btn w-100 py-3" style="background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); color: white; font-weight: 600; border-radius: 50px; border: none; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3); font-size: 1.1rem;">
                ✅ Complete Registration
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="/parent-dashboard.html" class="btn btn-outline-primary rounded-pill px-4">
                ← Back to Dashboard
            </a>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="modern-footer mt-auto">
    <div class="container text-center">
        <p class="mb-0">© 2025 CampSphere. Making camp memories! ⛺</p>
    </div>
</footer>

<script>
    const parentId = +localStorage.getItem("parentId");
    if (!parentId) location.href = "/parent-login.html";

    async function loadChildren() {
      const res = await fetch("/api/children");
      const all = await res.json();
      const mine = all.filter(c => c.parentId === parentId);
      const sel = document.getElementById("childSelect");
      sel.innerHTML = "";
      mine.forEach(c => sel.add(new Option(c.name, c.id)));
    }

    async function loadCamps() {
      const res = await fetch("/api/camps");
      const camps = await res.json();
      const sel = document.getElementById("campSelect");
      sel.innerHTML = "";
      camps.forEach(c => sel.add(new Option(c.name, c.id)));
      sel.addEventListener("change", loadTrips);
      if (camps.length) loadTrips();
    }

    async function loadTrips() {
      const campId = document.getElementById("campSelect").value;
      const res = await fetch(`/api/trips/byCamp/${campId}`);
      const trips = await res.json();
      const cont = document.getElementById("tripContainer");
      cont.innerHTML = "";
      if (!trips.length) {
        cont.innerHTML = "<em class='text-muted'>No optional trips for this camp.</em>";
      } else {
        trips.forEach(t => {
          const wrapper = document.createElement("div");
          wrapper.className = "form-check mb-2";
          
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.name = "trip";
          cb.value = t.id;
          cb.id = `trip-${t.id}`;
          cb.className = "form-check-input";

          const label = document.createElement("label");
          label.className = "form-check-label";
          label.htmlFor = `trip-${t.id}`;
          label.textContent = ` ${t.name}`;
          
          wrapper.appendChild(cb);
          wrapper.appendChild(label);
          cont.appendChild(wrapper);
        });
      }
    }

    document.getElementById("registerBtn").addEventListener("click", async () => {
      const childId = +document.getElementById("childSelect").value;
      const campId = +document.getElementById("campSelect").value;
      const tripIds = Array.from(document.querySelectorAll('input[name="trip"]:checked')).map(cb => +cb.value);

      const payload = { childId, campId, tripIds };
      const res = await fetch("/api/registrations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        return alert("❌ Error: " + await res.text());
      }

      alert("✅ Registration successful!");
      loadTrips();
    });

    // Initial load
    loadChildren();
    loadCamps();
</script>
</body>
</html>
