<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Parent Registration - CampSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/modern-style.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('/assets/camp-hero.jpg') center/cover no-repeat;
            opacity: 0.1;
            z-index: 0;
        }
        
        .register-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 1rem;
        }
        
        .register-card {
            background: white;
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .register-icon {
            width: 80px;
            height: 80px;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

<!-- Back to Home Button -->
<div style="position: absolute; top: 1.5rem; left: 1.5rem; z-index: 10;">
    <a href="/" class="btn btn-light rounded-pill px-4">
        ← Back to Home
    </a>
</div>

<!-- Register Container -->
<div class="register-container">
    <div class="register-card">
        <div class="register-icon">📝</div>
        <h2 class="text-center fw-bold mb-2">Parent Registration</h2>
        <p class="text-center text-muted mb-4">Join CampSphere and manage your children's camps!</p>
        
        <form id="regForm">
            <div class="mb-3">
                <label for="name" class="modern-form-label">Full Name</label>
                <input type="text" id="name" class="modern-form-control" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label for="email" class="modern-form-label">Email Address</label>
                <input type="email" id="email" class="modern-form-control" placeholder="your.email@example.com" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="modern-form-label">Phone Number</label>
                <input type="tel" id="phone" class="modern-form-control" placeholder="+40 123 456 789" required>
            </div>
            <div class="mb-4">
                <label for="password" class="modern-form-label">Password</label>
                <input type="password" id="password" class="modern-form-control" placeholder="Create a secure password" required>
            </div>
            <button type="submit" class="btn btn-modern-primary w-100 py-3 mb-3">
                Create Account
            </button>
        </form>
        
        <div class="text-center">
            <p class="text-muted mb-0">
                Already have an account? 
                <a href="/parent-login.html" class="fw-semibold text-decoration-none" style="color: var(--primary-blue);">
                    Log in here
                </a>
            </p>
        </div>
    </div>
</div>

<script>
    document.getElementById("regForm").addEventListener("submit", async e => {
      e.preventDefault();
      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value.trim()
      };
      const res = await fetch("/api/parents/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        alert("✅ Registered! Please log in.");
        location.href = "/parent-login.html";
      } else {
        alert("❌ " + await res.text());
      }
    });
</script>

</body>
</html>
