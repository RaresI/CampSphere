<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Owner Login - CampSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/modern-style.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #c084fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('/assets/camp-hero.jpg') center/cover no-repeat;
            opacity: 0.1;
            z-index: 0;
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 1rem;
        }
        
        .login-card {
            background: white;
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #8b5cf6 0%, #c084fc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>

<!-- Back to Home Button -->
<div style="position: absolute; top: 1.5rem; left: 1.5rem; z-index: 10;">
    <a href="/" class="btn btn-light rounded-pill px-4">
        ← Back to Home
    </a>
</div>

<!-- Login Container -->
<div class="login-container">
    <div class="login-card">
        <div class="login-icon">👑</div>
        <h2 class="text-center fw-bold mb-2">Owner Portal</h2>
        <p class="text-center text-muted mb-4">Manage your camp locations</p>
        
        <form id="ownerLoginForm">
            <div class="mb-3">
                <label for="owner-email" class="modern-form-label">Email Address</label>
                <input type="email" id="owner-email" name="email" class="modern-form-control" placeholder="owner@campsphere.com" required>
            </div>
            <div class="mb-4">
                <label for="owner-password" class="modern-form-label">Password</label>
                <input type="password" id="owner-password" name="password" class="modern-form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn w-100 py-3 mb-3" style="background: linear-gradient(135deg, #8b5cf6 0%, #c084fc 100%); color: white; font-weight: 600; border-radius: 50px; border: none; box-shadow: 0 4px 6px rgba(139, 92, 246, 0.3);">
                Access Dashboard
            </button>
        </form>
        
        <div class="text-center">
            <p class="text-muted mb-0">
                <small>Manage camps, activities, and more</small>
            </p>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <p class="text-white mb-2">
            <small>Need help? Contact support</small>
        </p>
    </div>
</div>

<script>
    document.getElementById("ownerLoginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const params = new URLSearchParams();
      params.append("email", form.email.value.trim());
      params.append("password", form.password.value);

      const res = await fetch("/api/auth/owner/login", {
        method: "POST",
        credentials: "include",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
        },
        body: params,
      });

      if (!res.ok) {
        const msg = await res.text();
        return alert("❌ Owner login failed: " + msg);
      }

      window.location.href = "/owner-dashboard.html";
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
